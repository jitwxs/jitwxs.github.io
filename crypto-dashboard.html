  <!-- ========= 主脚本 ========= -->
  <script>
    // ============ 示例数据（不包含任何真实数据） ============
    const SAMPLE_OWN_CSV = `日期,类型,子类型,金额,备注,剩余本金
2025-01-10,入金,初始本金,10000 RMB,示例初始本金,10000 RMB
2025-02-15,入金,工资,8000 RMB,示例月工资,18000 RMB
2025-03-20,出金,普通出金,2000 RMB,示例出金,16000 RMB
2025-04-10,入金,工资,8000 RMB,示例月工资,24000 RMB
2025-05-15,入金,项目奖,3000 USDT,示例项目奖金,45600 RMB
2025-06-10,入金,工资,8000 RMB,示例月工资,53600 RMB
2025-07-05,出金,普通出金,5000 RMB,示例出金,48600 RMB
2025-08-15,入金,OKB激励,10 OKB,示例OKB激励,57100 RMB
2025-09-10,入金,工资,8000 RMB,示例月工资,65100 RMB
2025-10-20,出金,大额出金,15000 RMB,示例大额出金,50100 RMB
2025-11-10,入金,工资,8000 RMB,示例月工资,58100 RMB
2025-12-15,入金,年终奖,20000 RMB,示例年终奖,78100 RMB
2026-01-10,入金,工资,8500 RMB,示例月工资,86600 RMB
2026-02-10,入金,工资,8500 RMB,示例月工资,95100 RMB
2026-03-10,入金,工资,8500 RMB,示例月工资,103600 RMB
2026-04-10,入金,长期激励,15000 RMB,示例长期激励,118600 RMB
2026-05-10,入金,工资,8500 RMB,示例月工资,127100 RMB
2026-06-10,入金,工资,8500 RMB,示例月工资,135600 RMB`;

    const SAMPLE_CUSTODY_CSV = `日期,托管数量(OKB),状态,备注
2025-03-10,10,持有,示例托管10 OKB
2025-06-15,25,持有,示例增加至25 OKB
2025-09-20,15,持有,示例提取10 OKB
2025-12-01,40,持有,示例增加至40 OKB
2026-03-15,30,持有,示例提取10 OKB
2026-06-01,50,持有,示例最新50 OKB`;

    // ============ 汇率配置 ============
    const DEFAULT_RATES = {
      RMB: 1,
      USDT: 7.2,
      USD: 7.2,
      OKB: 85,
      HKD: 0.93,
    };

    let currentRates = { ...DEFAULT_RATES };

    // ============ 数据状态标志 ============
    let ownDataIsSample = true;
    let custodyDataIsSample = true;

    const moneyFmt = (num) => {
      if (num === undefined || num === null || isNaN(num)) return '¥0.00';
      const n = Number(num);
      const sign = n < 0 ? '-' : '';
      const abs = Math.abs(n);
      return sign + '¥' + abs.toLocaleString('zh-CN', { maximumFractionDigits: 2, minimumFractionDigits: 2 });
    };

    const numFmt = (num, digits) => {
      const d = digits || 2;
      if (num === undefined || num === null || isNaN(num)) return '0';
      return Number(num).toLocaleString('zh-CN', { maximumFractionDigits: d, minimumFractionDigits: d });
    };

    function parseAmount(amountStr) {
      if (!amountStr) return { value: 0, currency: 'RMB' };
      const trimmed = amountStr.trim();
      const match = trimmed.match(/^([\d.]+)\s*([A-Za-z]+)?$/);
      if (match) {
        const value = parseFloat(match[1]) || 0;
        const currency = (match[2] || 'RMB').toUpperCase();
        return { value: value, currency: currency };
      }
      const numMatch = trimmed.match(/[\d.]+/);
      return { value: numMatch ? parseFloat(numMatch[0]) : 0, currency: 'RMB' };
    }

    function toRMB(parsed) {
      const rate = currentRates[parsed.currency] !== undefined ? currentRates[parsed.currency] : 1;
      return parsed.value * rate;
    }

    function amountToRMB(amountStr) {
      return toRMB(parseAmount(amountStr));
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/).filter(function(l) { return l.trim().length > 0; });
      if (lines.length === 0) return [];
      const headers = lines[0].split(',').map(function(h) { return h.trim(); });
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i];
        const values = [];
        let cur = '';
        let inQuote = false;
        for (let j = 0; j < line.length; j++) {
          const ch = line[j];
          if (ch === '"') inQuote = !inQuote;
          else if (ch === ',' && !inQuote) { values.push(cur.trim()); cur = ''; }
          else cur += ch;
        }
        values.push(cur.trim());
        const row = {};
        headers.forEach(function(h, idx) { row[h] = values[idx] !== undefined ? values[idx] : ''; });
        rows.push(row);
      }
      return rows;
    }

    async function loadCSV(url) {
      // 保留作为代码示例：在浏览器本地 file:// 协议下 fetch 会触发 CORS 错误
      // 实际应用请通过 FileReader 读取用户上传的文件
      throw new Error('CSV 加载请使用 FileReader（file:// 协议下 fetch 会触发跨域错误）');
    }

    let rawTransactions = [];
    let rawCustody = [];
    let charts = {};
    let txShowAll = false; // false = show last year only

    const COLOR_MAP = {
      primary: '#165DFF',
      secondary: '#0FC6C2',
      success: '#00B42A',
      warning: '#FF7D00',
      danger: '#F53F3F',
      dark: '#1D2129'
    };

    // 按本地时间解析 YYYY-MM-DD 格式（避免 UTC 时区偏差）
    function parseLocalDate(dateStr) {
      if (!dateStr) return null;
      const parts = dateStr.trim().split('-');
      if (parts.length < 3) return null;
      const y = parseInt(parts[0], 10);
      const m = parseInt(parts[1], 10) - 1;
      const d = parseInt(parts[2], 10);
      return new Date(y, m, d, 0, 0, 0, 0);
    }

    // 计算最近一年的日期分界点（基于最新交易记录日期 - 1 年）
    function getOneYearCutoffDate() {
      if (rawTransactions.length === 0) return null;
      const lastDate = rawTransactions[rawTransactions.length - 1]['日期'];
      const d = parseLocalDate(lastDate);
      if (!d) return null;
      d.setFullYear(d.getFullYear() - 1);
      return d;
    }

    function isWithinLastYear(dateStr) {
      const cutoff = getOneYearCutoffDate();
      if (!cutoff) return true;
      const d = parseLocalDate(dateStr);
      if (!d) return false;
      return d >= cutoff;
    }

    function renderRateCards() {
      const currencies = [
        { code: 'OKB', name: 'OKB Token' },

    function renderTxTable() {
      const typeFilter = document.getElementById('typeFilter').value;
      const subFilter = document.getElementById('subTypeFilter').value;
      const curFilter = document.getElementById('currencyFilter').value;

      let filtered = rawTransactions;
      if (typeFilter !== 'all') filtered = filtered.filter(function(r) { return r['类型'] === typeFilter; });
      if (subFilter !== 'all') filtered = filtered.filter(function(r) { return r['子类型'] === subFilter; });
      if (curFilter !== 'all') filtered = filtered.filter(function(r) { return parseAmount(r['金额']).currency === curFilter; });

      // 应用最近一年筛选
      let yearFiltered = filtered;
      if (!txShowAll) {
        yearFiltered = filtered.filter(function(r) { return isWithinLastYear(r['日期']); });
      }

      // 更新描述文本（显示日期范围）
      const cutoff = getOneYearCutoffDate();
      const lastDate = rawTransactions.length > 0 ? rawTransactions[rawTransactions.length - 1]['日期'] : '';
      const descEl = document.getElementById('txTableDesc');
      if (txShowAll) {
        descEl.innerHTML = '共 <b>' + filtered.length + '</b> 条记录（显示全部，共 ' + (filtered.length > 0 ? (filtered[0]['日期'] + ' ~ ' + lastDate) : '-') + '）';
      } else {
        const cutoffStr = cutoff ? cutoff.getFullYear() + '-' + String(cutoff.getMonth() + 1).padStart(2, '0') + '-' + String(cutoff.getDate()).padStart(2, '0') : '-';
        descEl.innerHTML = '共 <b>' + filtered.length + '</b> 条记录（默认仅显示最近 1 年：' + cutoffStr + ' ~ ' + lastDate + '，当前显示 ' + yearFiltered.length + ' 条）';
      }

      const tbody = document.getElementById('txTableBody');
      let html = '';

      const displayData = yearFiltered;

      for (let i = displayData.length - 1; i >= 0; i--) {
        const r = displayData[i];
        const parsed = parseAmount(r['金额']);
        const principal = amountToRMB(r['剩余本金']);

        const typeColor = isDeposit ? 'background:#e6f7ec; color:#00B42A;' : 'background:#fdecec; color:#F53F3F;';
        const principalColor = principal >= 0 ? 'color:#1D2129;' : 'color:#F53F3F;';
        html += '<tr class="border-b border-light-2 hover:bg-gray-50">' +
          '<td class="px-2 sm:px-4 py-2 sm:py-3 whitespace-nowrap text-dark-2 text-xs sm:text-sm">' + r['日期'] + '</td>' +
          '<td class="px-2 sm:px-4 py-2 sm:py-3"><span class="inline-block px-2 py-0.5 rounded-md text-xs sm:text-sm" style="' + typeColor + '">' + r['类型'] + '</span></td>' +
          '<td class="px-2 sm:px-4 py-2 sm:py-3 hidden md:table-cell text-xs sm:text-sm">' + (r['子类型'] || '-') + '</td>' +
          '<td class="px-2 sm:px-4 py-2 sm:py-3 text-right font-semibold text-dark-2 hidden sm:table-cell text-xs sm:text-sm">' + numFmt(parsed.value, 2) + ' ' + parsed.currency + '</td>' +
          '<td class="px-2 sm:px-4 py-2 sm:py-3 text-right font-semibold text-xs sm:text-sm" style="' + principalColor + '">' + moneyFmt(principal) + '</td>' +

        html = '<tr><td colspan="3" class="px-4 py-6 sm:py-10 text-center text-dark-2 text-xs sm:text-sm">暂无匹配记录</td></tr>';

      const moreDiv = document.getElementById('txTableMore');

      if (!txShowAll && yearFiltered.length < filtered.length) {
        moreDiv.classList.remove('hidden');
        loadMoreBtn.innerHTML = '<i class="fa fa-chevron-down mr-0.5"></i> 查看全部 (' + filtered.length + ' 条)';

        moreDiv.classList.remove('hidden');

        loadMoreBtn.classList.add('bg-orange-500', 'hover:bg-orange-600');
      } else {
        moreDiv.classList.add('hidden');
      }
    }

          ? { left: 50, right: 50, top: 15, bottom: 40 }
          : { left: 70, right: 70, top: 20, bottom: 40 },
        xAxis: { type: 'category', data: dates, boundaryGap: false, axisLabel: { fontSize: 10, rotate: 45, hideOverlap: true } },
        yAxis: [
          { type: 'value', name: 'OKB', position: 'left', axisLabel: { fontSize: 10, formatter: function(v) { return numFmt(v, 2); } } },
          { type: 'value', name: 'RMB', position: 'right', axisLabel: { fontSize: 10, formatter: function(v) { return Math.abs(v) >= 10000 ? (v / 10000).toFixed(1) + '万' : v; } } }
        ],
        dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', start: 0, end: 100, height: 20, bottom: 25 }],
        series: [
          {
            name: 'OKB 数量', type: 'line', yAxisIndex: 0, data: okbAmounts, smooth: true, symbol: 'circle', symbolSize: 6,
            lineStyle: { color: '#0FC6C2', width: 2 }, itemStyle: { color: '#0FC6C2' },
            areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(15, 198, 194, 0.3)' }, { offset: 1, color: 'rgba(15, 198, 194, 0.02)' }]) }
          },
          {
            name: '估值 (RMB)', type: 'line', yAxisIndex: 1, data: rmbAmounts, smooth: true, symbol: 'circle', symbolSize: 4,
            lineStyle: { color: '#165DFF', width: 2 }, itemStyle: { color: '#165DFF' }
          }
        ]
      });
    }

    function renderCustodyTable() {
      document.getElementById('custodyCount').textContent = rawCustody.length;
      const tbody = document.getElementById('custodyTableBody');
      const okbRate = currentRates.OKB || 1;

      let html = '';
      for (let i = rawCustody.length - 1; i >= 0; i--) {
        const r = rawCustody[i];
        const okb = parseFloat(r['托管数量(OKB)']) || 0;
        const status = r['状态'] || '-';
        let statusStyle;
        if (status === '持有') statusStyle = 'background:#e6f7ec; color:#00B42A;';
        else if (status === '已提取') statusStyle = 'background:#fdecec; color:#F53F3F;';
        else statusStyle = 'background:#f5f5f5; color:#666;';
        html += '<tr class="border-b border-light-2 hover:bg-gray-50">' +
          '<td class="px-2 sm:px-4 py-2 sm:py-3 whitespace-nowrap text-dark-2 text-xs sm:text-sm">' + r['日期'] + '</td>' +
          '<td class="px-2 sm:px-4 py-2 sm:py-3 text-right font-semibold text-primary text-xs sm:text-sm">' + numFmt(okb, 4) + ' OKB</td>' +
          '<td class="px-2 sm:px-4 py-2 sm:py-3 text-right font-semibold text-dark-2 hidden sm:table-cell text-xs sm:text-sm">' + moneyFmt(okb * okbRate) + '</td>' +
          '<td class="px-2 sm:px-4 py-2 sm:py-3 hidden md:table-cell"><span class="inline-block px-2 py-0.5 rounded-md text-xs sm:text-sm" style="' + statusStyle + '">' + status + '</span></td>' +
          '<td class="px-2 sm:px-4 py-2 sm:py-3 text-dark-2 hidden lg:table-cell text-xs sm:text-sm">' + (r['备注'] || '-') + '</td>' +
          '</tr>';
      }
      if (rawCustody.length === 0) {
        html = '<tr><td colspan="2" class="px-4 py-6 sm:py-10 text-center text-dark-2 text-xs sm:text-sm">暂无托管记录</td></tr>';
      }
      tbody.innerHTML = html;
    }

    // ============ 统一渲染 ============

    function resizeCharts() {
      Object.values(charts).forEach(function(c) { c.resize(); });
    }
    window.addEventListener('resize', resizeCharts);

    function renderAll() {
      // 自有账户
      renderSummaryCards();
      renderPrincipalTrend();
      renderDepositTypeChart();
      renderYearlyBarChart();
      renderMonthlyChart();
      renderTxTable();

      // 托管账户
      renderCustodySummaryCards();
      renderCustodyTrendChart();
      renderCustodyTable();

      // 汇率
      renderRateCards();
    }

    // Tab 切换（自有账户 = 蓝色，托管账户 = 青色，同时更新上传区提示）
    let currentTab = 'own';
    function switchTab(tab) {
      const btnOwn = document.getElementById('tabOwn');
      const btnCustody = document.getElementById('tabCustody');
      const panelOwn = document.getElementById('panelOwn');
      const panelCustody = document.getElementById('panelCustody');
      const dropArea = document.getElementById('fileDropArea');
      const hint = document.getElementById('dropAreaHint');

      // 重置两个按钮的样式类
      btnOwn.classList.remove('active', 'active-custody');
      btnCustody.classList.remove('active', 'active-custody');

      if (tab === 'own') {
        btnOwn.classList.add('active');
        panelOwn.style.display = 'block';
        panelCustody.style.display = 'none';
        if (hint) hint.textContent = '自有账户：拖放 CSV 到此处，或';
        if (dropArea) { dropArea.classList.remove('file-drop-area-custody'); dropArea.classList.add('file-drop-area'); }
        showStatus('当前显示自有账户数据，共 ' + rawTransactions.length + ' 条记录', 'info');
      } else {
        btnCustody.classList.add('active-custody');
        panelCustody.style.display = 'block';
        panelOwn.style.display = 'none';
        if (hint) hint.textContent = '托管账户：拖放 CSV 到此处，或';
        if (dropArea) { dropArea.classList.remove('file-drop-area'); dropArea.classList.add('file-drop-area-custody'); }
        showStatus('当前显示托管账户数据，共 ' + rawCustody.length + ' 条记录', 'info');
      }
      currentTab = tab;

      // Tab 切换后需要 resize 图表（隐藏状态下尺寸为 0）
      setTimeout(resizeCharts, 50);
    }

    // ============ 统一状态提示 ============
    function showStatus(msg, type) {
      const el = document.getElementById('importStatus');
      if (!el) return;
      const colors = { info: 'text-gray-500', success: 'text-green-600', error: 'text-red-600', warning: 'text-orange-500' };
      el.className = 'mt-2 text-xs sm:text-sm ' + (colors[type] || 'text-gray-500');
      el.classList.remove('hidden');
      const isSample = (currentTab === 'own') ? ownDataIsSample : custodyDataIsSample;
      const sourceLabel = isSample ? '【示例数据】' : '【您的数据】';
      el.innerHTML = sourceLabel + ' ' + msg;
    }

    // ============ 动态同步 main 区域的 paddingTop（避免被 fixed header 遮挡）============
    function syncMainOffset() {
      const header = document.getElementById('appHeader');
      const main = document.getElementById('mainContent');
      if (!header || !main) return;
      main.style.paddingTop = (header.offsetHeight + 16) + 'px';
    }

    // ============ CSV 文件上传（统一上传区，根据当前 Tab 决定上传到哪个账户）============
    function setupUnifiedUpload() {
      const dropArea = document.getElementById('fileDropArea');
      const fileInput = document.getElementById('csvFile');
      const btnReset = document.getElementById('btnReset');
      const btnClear = document.getElementById('btnClear');

      // 点击上传
      dropArea.addEventListener('click', function(e) {
        if (e.target === btnReset || e.target === btnClear || e.target.closest('#btnReset') || e.target.closest('#btnClear')) return;
        fileInput.click();
      });

      // 拖放支持
      dropArea.addEventListener('dragover', function(e) {
        e.preventDefault();
        dropArea.classList.add('active');
      });
      dropArea.addEventListener('dragleave', function() {
        dropArea.classList.remove('active');
      });
      dropArea.addEventListener('drop', function(e) {
        e.preventDefault();
        dropArea.classList.remove('active');
        if (e.dataTransfer.files.length) {
          handleFile(e.dataTransfer.files[0]);
        }
      });

      // 文件选择
      fileInput.addEventListener('change', function() {
        if (fileInput.files.length) {
          handleFile(fileInput.files[0]);
          fileInput.value = '';
        }
      });

      // 重置按钮：根据当前 Tab 恢复对应示例数据
      btnReset.addEventListener('click', function(e) {
        e.stopPropagation();
        if (currentTab === 'own') {
          rawTransactions = parseCSV(SAMPLE_OWN_CSV);
          ownDataIsSample = true;
          populateFilters();
          renderAll();
          showStatus('已恢复为示例数据，共 ' + rawTransactions.length + ' 条记录', 'info');
        } else {
          rawCustody = parseCSV(SAMPLE_CUSTODY_CSV);
          custodyDataIsSample = true;
          renderCustodySummaryCards();
          renderCustodyTrendChart();
          renderCustodyTable();
          resizeCharts();
          showStatus('已恢复为示例数据，共 ' + rawCustody.length + ' 条记录', 'info');
        }
      });

      // 清空按钮：根据当前 Tab 清空对应数据
      btnClear.addEventListener('click', function(e) {
        e.stopPropagation();
        if (currentTab === 'own') {
          rawTransactions = [];
          ownDataIsSample = false;
          populateFilters();
          renderAll();
          showStatus('已清空自有账户数据', 'warning');
        } else {
          rawCustody = [];
          custodyDataIsSample = false;
          renderCustodySummaryCards();
          renderCustodyTrendChart();
          renderCustodyTable();
          resizeCharts();
          showStatus('已清空托管账户数据', 'warning');
        }
      });
    }

    function handleFile(file) {
      if (!file.name.endsWith('.csv')) {
        showStatus('请上传 CSV 格式文件', 'error');
        return;
      }
      showStatus('正在解析文件...', 'info');
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = parseCSV(e.target.result);
          if (data.length === 0) {
            showStatus('CSV 文件内容为空', 'warning');
            return;
          }
          if (currentTab === 'own') {
            rawTransactions = data;
            ownDataIsSample = false;
            populateFilters();
            renderAll();
            showStatus('自有账户文件导入成功，共 ' + data.length + ' 条记录', 'success');
          } else {
            rawCustody = data;
            custodyDataIsSample = false;
            renderCustodySummaryCards();
            renderCustodyTrendChart();
            renderCustodyTable();
            resizeCharts();
            showStatus('托管账户文件导入成功，共 ' + data.length + ' 条记录', 'success');
          }
        } catch (err) {
          showStatus('解析文件时出错: ' + err.message, 'error');
        }
      };
      reader.onerror = function() { showStatus('读取文件失败', 'error'); };
      reader.readAsText(file, 'UTF-8');
    }

    // ============ 主程序入口 ============
    async function main() {
      try {
        // 1. 默认加载示例数据（不读取任何外部文件，避免数据泄露）
        rawTransactions = parseCSV(SAMPLE_OWN_CSV);
        rawCustody = parseCSV(SAMPLE_CUSTODY_CSV);
        ownDataIsSample = true;
        custodyDataIsSample = true;

        // 2. 渲染页面
        populateFilters();
        renderAll();

        // 3. 初始化主内容 paddingTop（避免被 fixed header 遮挡）
        syncMainOffset();

        // 4. 显示默认 Tab（自有账户）的数据状态
        showStatus('当前显示示例数据，共 ' + rawTransactions.length + ' 条记录，可上传您的 CSV', 'info');

        // 5. Tab 绑定
        document.getElementById('tabOwn').addEventListener('click', function() { switchTab('own'); });
        document.getElementById('tabCustody').addEventListener('click', function() { switchTab('custody'); });

        // 6. 自有账户筛选绑定
        document.getElementById('typeFilter').addEventListener('change', renderTxTable);
        document.getElementById('subTypeFilter').addEventListener('change', renderTxTable);
        document.getElementById('currencyFilter').addEventListener('change', renderTxTable);

        // 7. 查看更多（切换最近一年 / 全部 - 双向切换）
        const loadMoreBtn = document.getElementById('txLoadMore');
        loadMoreBtn.addEventListener('click', function() {
          txShowAll = !txShowAll;
          renderTxTable();
        });

        // 8. 初始化统一上传功能
        setupUnifiedUpload();

        // 9. 窗口 resize：同步 paddingTop 并 resize 图表
        window.addEventListener('resize', function() {
          syncMainOffset();
          resizeCharts();
        });

        // 10. 字体/图片加载完成后再次同步 paddingTop
        setTimeout(syncMainOffset, 300);
        setTimeout(syncMainOffset, 1000);

      } catch (err) {
        console.error(err);
        const status = document.getElementById('rateCards');
        if (status) status.innerHTML = '<span class="text-red-500">数据加载失败</span>';
      }
    }

    main();
  </script>
</body>
</html>
